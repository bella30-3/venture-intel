name: Auto-Refresh Venture Intel
on:
  schedule:
    # Every 48 hours (every other day at 9 AM UTC)
    - cron: '0 9 */2 * *'
  workflow_dispatch:
    inputs:
      top_matches:
        description: 'Number of top matches'
        default: '30'
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate fresh matches and static site
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: *** secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          # Generate match report
          python main.py --top ${{ inputs.top_matches || '30' }} --match-only

          # Generate static site
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from web import render_page
          os.makedirs('docs', exist_ok=True)
          html = render_page(view='all', top_n=30)
          with open('docs/index.html', 'w') as f:
              f.write(html)
          print(f'Generated docs/index.html ({len(html)} bytes)')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: venture-intel-${{ github.run_number }}
          path: |
            reports/*-daily-digest.*
            docs/index.html
          retention-days: 90

      - name: Commit refreshed site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html reports/
          git diff --staged --quiet || git commit -m "🔄 Auto-refresh $(date +%Y-%m-%d)"
          git push
